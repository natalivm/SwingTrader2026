<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SwingTrader 2026 - A responsive web application for swing trading">
    <meta name="theme-color" content="#1e40af">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SwingTrader">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231e40af' width='192' height='192'/><text x='96' y='120' font-size='100' font-weight='bold' fill='white' text-anchor='middle' font-family='Arial'>ST</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231e40af' width='192' height='192'/><text x='96' y='120' font-size='100' font-weight='bold' fill='white' text-anchor='middle' font-family='Arial'>ST</text></svg>">
    <title>SwingTrader 2026</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">SwingTrader 2026</div>
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li class="nav-item"><a href="#dashboard" class="nav-link active" data-tab="dashboard">Dashboard</a></li>
                <li class="nav-item"><a href="#portfolio" class="nav-link" data-tab="portfolio">Portfolio</a></li>
                <li class="nav-item"><a href="#analytics" class="nav-link" data-tab="analytics">Analytics</a></li>
                <li class="nav-item"><a href="#strategies" class="nav-link" data-tab="strategies">Strategies</a></li>
                <li class="nav-item"><a href="#settings" class="nav-link" data-tab="settings">Settings</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <!-- Dashboard Page -->
        <section id="dashboard" class="page active" data-page="dashboard">
            <div class="page-container">
                <h1>Dashboard</h1>
                <p>Dashboard content goes here</p>
            </div>
        </section>

        <!-- Portfolio Page -->
        <section id="portfolio" class="page" data-page="portfolio">
            <div class="page-container">
                <h1>Portfolio</h1>
                <p>Portfolio content goes here</p>
            </div>
        </section>

        <!-- Analytics Page -->
        <section id="analytics" class="page" data-page="analytics">
            <div class="page-container">
                <h1>Analytics</h1>
                <p>Analytics content goes here</p>
            </div>
        </section>

        <!-- Strategies Page -->
        <section id="strategies" class="page" data-page="strategies">
            <div class="page-container">
                <h1>Strategies</h1>
                <p>Strategies content goes here</p>
            </div>
        </section>

        <!-- Settings Page -->
        <section id="settings" class="page" data-page="settings">
            <div class="page-container">
                <h1>Settings</h1>
                <p>Settings content goes here</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
