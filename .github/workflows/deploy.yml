name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install minifiers
        run: npm install -g html-minifier-terser clean-css-cli terser
      - name: Build
        run: |
          mkdir dist
          cp manifest.json icon-192.png icon-512.png icon-192.svg icon-512.svg dist/
          html-minifier-terser \
            --collapse-whitespace \
            --remove-comments \
            --remove-redundant-attributes \
            --use-short-doctype \
            -o dist/index.html index.html
          cleancss -o dist/styles.css styles.css
          terser data.js   -o dist/data.js   --compress --mangle
          terser script.js -o dist/script.js --compress --mangle
          CACHE_VER=$(git rev-parse --short HEAD)
          sed "s/swingtrader-v[0-9]*/swingtrader-${CACHE_VER}/" sw.js > /tmp/sw_ver.js
          terser /tmp/sw_ver.js -o dist/sw.js --compress --mangle
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
